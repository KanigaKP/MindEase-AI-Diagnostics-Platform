version: '3.8'

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: mindease-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindease-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - chroma
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindease-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

volumes:
  chroma-data:
  backend-data:
